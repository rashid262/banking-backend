spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    # Manually setting the platform because we are disabling auto-detection
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        temp:
          # This stops Hibernate from querying metadata (the cause of your crash)
          use_jdbc_metadata_defaults: false
        jdbc:
          time_zone: UTC
          batch_size: 0

spring:
  mail:
    host: smtp.gmail.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          # For Port 465, SSL must be TRUE and StartTLS should be FALSE
          ssl:
            enable: true
          starttls:
            enable: false
          # This helps Spring Boot find the right socket factory for SSL
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  verification:
    url: ${APP_BASE_URL}/api/v1/auth/verify?token=

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE